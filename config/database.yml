default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: sytemecosystem_development
  <% if ENV["DB_HOST"].present? %>
  host: <%= ENV["DB_HOST"] %>
  username: <%= ENV.fetch("DB_USERNAME") { ENV["USER"] } %>
  password: <%= ENV["DB_PASSWORD"] %>
  <% end %>

test:
  <<: *default
  database: sytemecosystem_test
  <% if ENV["DB_HOST"].present? %>
  host: <%= ENV["DB_HOST"] %>
  username: <%= ENV.fetch("DB_USERNAME") { ENV["USER"] } %>
  password: <%= ENV["DB_PASSWORD"] %>
  <% end %>

# Production — single database host via DATABASE_URL (Hatchbox / Kamal /
# Heroku all set this automatically). Solid Cache, Queue and Cable share the
# primary database; their tables live alongside the app tables in one
# physical DB. Standard for a single-server deploy — isolate them later if
# traffic demands it.
production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    migrations_paths: db/cable_migrate